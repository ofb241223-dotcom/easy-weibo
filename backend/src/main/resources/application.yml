server:
  port: 8080

spring:
  application:
    name: easyweibo-backend
  datasource:
    url: jdbc:mysql://localhost:3306/${MYSQL_DATABASE:easyweibo}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${MYSQL_USER:easyweibo}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB
  sql:
    init:
      mode: never
      encoding: UTF-8

mybatis:
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: ${JWT_SECRET:change-this-dev-secret-change-this-dev-secret}
    expire-hours: 72
  upload-dir: uploads
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash-lite}
